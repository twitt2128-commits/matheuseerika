<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flowers</title>

<style>

body{
margin:0;
background:#081c2c;
overflow:hidden;
}

canvas{
display:block;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>

</head>

<body>

<script>

let flowers=[];

function setup(){

createCanvas(window.innerWidth,window.innerHeight);

for(let i=0;i<40;i++){
flowers.push(new Flower());
}

}

function draw(){

background(10,30,50);

for(let f of flowers){
f.update();
f.display();
}

}

class Flower{

constructor(){

this.x=random(width);
this.y=random(height);
this.size=random(20,40);
this.speed=random(0.3,1);

}

update(){

this.y-=this.speed;

if(this.y<-20){
this.y=height+20;
this.x=random(width);
}

}

display(){

push();

translate(this.x,this.y);

fill(255,150,200);
noStroke();

for(let i=0;i<6;i++){
ellipse(0,this.size/2,this.size/2,this.size);
rotate(TWO_PI/6);
}

fill(255,200,0);
ellipse(0,0,this.size/2);

pop();

}

}

function windowResized(){
resizeCanvas(window.innerWidth,window.innerHeight);
}

</script>

</body>
</html>
